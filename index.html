<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="mershandlee is a Vienna-based architecture and design studio founded in 2017.">
  <title>Works | mershandlee</title>
  <link rel="stylesheet" href="admin/cms.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #000;
      background: #fff;
    }
    
    .wrapper {
      display: flex;
    }
    
    /* LEFT SIDEBAR - FIXED */
    .sidebar {
      width: 30%;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      border-right: 1px solid #f0f0f0;
    }
    
    .logo {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 80px;
      letter-spacing: -2px;
    }
    
    nav {
      display: flex;
      gap: 30px;
      font-size: 15px;
      font-weight: 500;
    }
    
    nav button {
      background: none;
      border: none;
      font-size: 15px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }
    
    nav button:hover {
      opacity: 0.6;
    }
    
    .contact {
      font-size: 14px;
      margin-top: auto;
    }
    
    .contact a {
      color: #000;
      text-decoration: none;
    }
    
    /* RIGHT MAIN CONTENT */
    .main {
      width: 70%;
      margin-left: 30%;
      min-height: 100vh;
    }
    
    .page {
      display: none;
    }
    
    .page.active {
      display: block;
    }
    
    /* PROJECTS PAGE */
    .projects-container {
      padding: 60px;
    }
    
    .project-section {
      margin-bottom: 120px;
      padding-bottom: 80px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .project-section:last-child {
      border-bottom: none;
    }
    
    .project-image {
      width: 100%;
      height: 500px;
      background: #f5f5f5;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #ccc;
      overflow: hidden;
      object-fit: cover;
    }
    
    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .project-info {
      cursor: pointer;
    }
    
    .project-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .project-index {
      font-size: 12px;
      color: #999;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .project-section:hover .project-index {
      opacity: 1;
    }
    
    /* WRITINGS PAGE */
    .writings-container {
      padding: 60px;
      max-width: 800px;
    }
    
    .writing-section {
      margin-bottom: 80px;
      padding-bottom: 80px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .writing-section:last-child {
      border-bottom: none;
    }
    
    .writing-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
    }
    
    .writing-title:hover {
      opacity: 0.6;
    }
    
    .writing-meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }
    
    .writing-excerpt {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }
    
    /* ABOUT PAGE */
    .about-container {
      padding: 60px;
      max-width: 800px;
    }
    
    .about-text {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
      <div class="logo">m e r sh<br>and l ee</div>
      
      <nav>
        <button onclick="showPage('projects')">Projects</button>
        <button onclick="showPage('writings')">Writings</button>
        <button onclick="showPage('about')">About</button>
      </nav>
      
      <div class="contact">
        <a href="mailto:studio@mershandlee.com">studio@mershandlee.com</a>
      </div>
    </div>

    <!-- RIGHT MAIN CONTENT -->
    <div class="main">
      
      <!-- PROJECTS PAGE -->
      <div id="projects" class="page active">
        <div class="projects-container" id="projects-list">
          <!-- Projects loaded from data -->
        </div>
      </div>

      <!-- WRITINGS PAGE -->
      <div id="writings" class="page">
        <div class="writings-container" id="writings-list">
          <!-- Writings loaded from data -->
        </div>
      </div>

      <!-- ABOUT PAGE -->
      <div id="about" class="page">
        <div class="about-container" id="about-content">
          <!-- About content loaded from data -->
        </div>
      </div>
      
    </div>
  </div>

  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <script>
    // Load projects from JSON
    async function loadProjects() {
      try {
        const response = await fetch('projects.json');
        const data = await response.json();
        renderProjects(data.projects);
      } catch (error) {
        console.log('Projects not loaded yet');
      }
    }
    
    // Load writings from JSON
    async function loadWritings() {
      try {
        const response = await fetch('writings.json');
        const data = await response.json();
        renderWritings(data.writings);
      } catch (error) {
        console.log('Writings not loaded yet');
      }
    }
    
    // Load about content
    async function loadAbout() {
      try {
        const response = await fetch('about.json');
        const data = await response.json();
        renderAbout(data);
      } catch (error) {
        console.log('About not loaded yet');
      }
    }
    
    function renderProjects(projects) {
      const container = document.getElementById('projects-list');
      container.innerHTML = '';
      
      projects.forEach((project, index) => {
        const section = document.createElement('div');
        section.className = 'project-section';
        section.innerHTML = `
          <div class="project-image">
            ${project.image ? `<img src="${project.image}" alt="${project.title}">` : 'Image placeholder'}
          </div>
          <div class="project-info">
            <div class="project-title">${project.title}</div>
            <div class="project-index">${String(index + 1).padStart(2, '0')}</div>
          </div>
        `;
        container.appendChild(section);
      });
    }
    
    function renderWritings(writings) {
      const container = document.getElementById('writings-list');
      container.innerHTML = '';
      
      writings.forEach((writing) => {
        const section = document.createElement('div');
        section.className = 'writing-section';
        section.innerHTML = `
          <div class="writing-title">${writing.title}</div>
          <div class="writing-meta">${writing.meta}</div>
          <div class="writing-excerpt">${writing.excerpt}</div>
        `;
        container.appendChild(section);
      });
    }
    
    function renderAbout(about) {
      const container = document.getElementById('about-content');
      container.innerHTML = '';
      
      about.paragraphs.forEach((para) => {
        const p = document.createElement('p');
        p.className = 'about-text';
        p.innerHTML = para;
        container.appendChild(p);
      });
    }
    
    function showPage(pageName) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });
      document.getElementById(pageName).classList.add('active');
    }
    
    // Load content on page load
    window.addEventListener('load', () => {
      loadProjects();
      loadWritings();
      loadAbout();
    });
  </script>

</body>
</html>
