<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="mershandlee is a Vienna-based architecture and design studio founded in 2017.">
  <title>Works | mershandlee</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
  font-family: 'Infini';
  src: url('/infini-romain.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}

@font-face {
  font-family: 'Infini';
  src: url('/infini-gras.otf') format('opentype');
  font-weight: 900;
  font-style: normal;
}

@font-face {
  font-family: 'Infini';
  src: url('/infini-italique.otf') format('opentype');
  font-weight: 400;
  font-style: italic;
}
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      font-family: 'Infini', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #000;
      background: #fff;
    }
    
    .wrapper {
      display: flex;
      min-height: 100vh;
    }
    
    .sidebar {
      width: 470px;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }
    
    .logo {
      font-size: 85px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 0;
      letter-spacing: -3px;
      flex-grow: 1;
      display: flex;
      align-items: flex-start;
      padding-top: 20px;
    }
    
    .sidebar-footer {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    
    nav {
      display: flex;
      gap: 20px;
      font-size: 21px;
      font-weight: 900;
    }
    
    nav button {
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }
    
    nav button:hover {
      opacity: 0.6;
    }
    
    .main {
      width: calc(100% - 470px);
      margin-left: 470px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .main-content {
      flex: 1;
      padding: 60px 60px 60px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .page {
      display: none;
      width: 100%;
    }
    
    .page.active {
      display: flex;
      flex-direction: column;
    }
    
    .projects-scroll {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 100px;
    }
    
    .project-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .project-section:hover {
      opacity: 0.8;
    }
    
    .project-image {
      width: 90%;
      max-width: 600px;
      height: 500px;
      background: transparent;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #ccc;
      overflow: hidden;
    }
    
    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .project-title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .project-detail-page {
      width: 100%;
      max-width: 900px;
    }
    
    .back-link {
      display: none;
    }
    
    .back-link:hover {
      color: #000;
    }
    
    .detail-title {
      display: none;
    }
    
    .detail-meta {
      display: none;
    }
    
    .image-gallery {
      display: flex;
      gap: 40px;
      overflow-x: auto;
      margin-bottom: 60px;
      width: 100%;
      padding-bottom: 15px;
    }
    
    .gallery-image {
      flex: 0 0 auto;
      height: 600px;
      background: transparent;
      display: block;
    }

    .gallery-image img {
      height: 600px;
      width: auto;
      display: block;
      max-width: none;
    }
    
    .detail-description {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      text-align: left;
      width: 100%;
    }
    
    .writings-content {
      width: 100%;
      max-width: 700px;
    }
    
    .writing-section {
      margin-bottom: 80px;
      padding-bottom: 80px;
      border-bottom: 1px solid #f0f0f0;
      text-align: center;
    }
    
    .writing-section:last-child {
      border-bottom: none;
    }
    
    .writing-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .writing-meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }
    
    .writing-excerpt {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }
    
    .about-content {
      width: 100%;
      max-width: 700px;
    }
    
    .about-text {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }
    
    .main-footer {
      padding: 40px 60px;
      text-align: right;
      font-size: 14px;
    }
    
    .main-footer a {
      color: #000;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="sidebar">
      <div class="logo">m e r sh<br>and l ee</div>
      <div class="sidebar-footer">
        <nav>
          <button onclick="showPage('projects')">Projects</button>
          <button onclick="showPage('about')">About</button>
          <button onclick="showPage('writings')">Writings</button>
        </nav>
      </div>
    </div>

    <div class="main">
      <div class="main-content">
        <div id="projects" class="page active">
          <div class="projects-scroll" id="projectsList"></div>
        </div>

        <div id="project-detail" class="page">
          <div class="project-detail-page">
            <span class="back-link" onclick="showPage('projects')">← back to projects</span>
            <h1 class="detail-title" id="detailTitle"></h1>
            <div class="detail-meta" id="detailMeta"></div>
            <div class="image-gallery" id="detailGallery"></div>
            <div class="detail-description" id="detailDescription"></div>
          </div>
        </div>

        <div id="writings" class="page">
          <div class="writings-content" id="writingsContent"></div>
        </div>

        <div id="about" class="page">
          <div class="about-content" id="aboutContent"></div>
        </div>
      </div>
      
      <div class="main-footer">
        <a href="mailto:studio@mershandlee.com">studio@mershandlee.com</a>
      </div>
    </div>
  </div>

  <script>
    const projectSlugs = [
      'rewildingtheground',
      'cityofmanyacts',
      'silentwitness',
      'plusminuswall',
      'nikizbookshop',
      'diamondtowall',
      'thisisthat',
      'oblique',
      'misfitqualities',
      'vaseovalandtriangle',
      'wallhouse2',
      'palaisdeTokyo',
      'possibleactualities',
      'micromega',
      'proun',
      'seoulbiennale',
      'objectbuilding'
    ];

    let allProjects = [];
    let allWritings = [];
    let aboutData = {};

    async function loadProjects() {
      try {
        const response = await fetch('projects.json');
        const data = await response.json();
        allProjects = data.projects || [];
        renderProjects();
      } catch (error) {
        console.error('Error loading projects:', error);
      }
    }

    async function loadWritings() {
      try {
        const writings = await fetch('writings.json').then(r => r.json());
        allWritings = writings.writings || [];
        renderWritings();
      } catch (error) {
        console.error('Error loading writings:', error);
      }
    }

    async function loadAbout() {
      try {
        const about = await fetch('about.json').then(r => r.json());
        aboutData = about;
        renderAbout();
      } catch (error) {
        console.error('Error loading about:', error);
      }
    }

    function renderProjects() {
      const container = document.getElementById('projectsList');
      container.innerHTML = allProjects.map((project) => `
        <div class="project-section" onclick="showProjectDetail('${project.slug}')">
          <div class="project-image">
            ${project.images && project.images[0] ? `<img src="${project.images[0]}" alt="${project.title}">` : ''}
          </div>
          <div class="project-title">${project.title}</div>
        </div>
      `).join('');
    }

    function renderWritings() {
      const container = document.getElementById('writingsContent');
      container.innerHTML = allWritings.map(writing => `
        <div class="writing-section">
          <div class="writing-title">${writing.title}</div>
          <div class="writing-meta">${writing.meta}</div>
          <div class="writing-excerpt">${writing.excerpt}</div>
        </div>
      `).join('');
    }

    function renderAbout() {
      const container = document.getElementById('aboutContent');
      container.innerHTML = (aboutData.paragraphs || [])
        .map(para => `<p class="about-text">${para}</p>`)
        .join('');
    }

    function showProjectDetail(slug) {
      const project = allProjects.find(p => p.slug === slug);
      if (!project) return;

      document.getElementById('detailTitle').textContent = project.title;
      document.getElementById('detailMeta').textContent = project.meta || '';
      
      document.getElementById('detailGallery').innerHTML = (project.images || [])
        .map(img => `<div class="gallery-image"><img src="${img}" alt="${project.title}"></div>`)
        .join('');
      
      document.getElementById('detailDescription').innerHTML = project.description || '';

      showPage('project-detail');
    }

    function showPage(pageName) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });
      document.getElementById(pageName).classList.add('active');
      document.querySelector('.main-content').scrollTop = 0;
    }

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    loadProjects();
    loadWritings();
    loadAbout();
  </script>

</body>
</html>
